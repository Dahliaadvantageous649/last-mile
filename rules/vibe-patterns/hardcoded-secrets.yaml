rules:
  - id: hardcoded-secrets
    patterns:
      - pattern-either:
          - pattern: |
              $KEY = "sk_live_..."
          - pattern: |
              $KEY = "sk_test_..."
          - pattern: |
              api_key = "..."
    message: >
      Hardcoded API key detected. Use environment variables or a secrets manager.
    severity: ERROR
    metadata:
      cwe: "CWE-798"
      category: security
      confidence: HIGH
    languages: [javascript, typescript, python]
