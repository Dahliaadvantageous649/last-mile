rules:
  - id: hardcoded-secrets
    pattern-either:
      - patterns:
          - pattern: $KEY = "$VAL"
          - metavariable-regex:
              metavariable: $KEY
              regex: (?i).*(api[_]?key|api[_]?secret|secret[_]?key|password|passwd|token|auth[_]?token|access[_]?token|private[_]?key|credentials|client[_]?secret).*
      - patterns:
          - pattern: $KEY = "$VAL"
          - metavariable-regex:
              metavariable: $VAL
              regex: ^(sk_live_|sk_test_|ghp_|gho_|AKIA|AIza|xox[bpas]\-).*
      - patterns:
          - pattern: |
              { ..., $KEY: "$VAL", ... }
          - metavariable-regex:
              metavariable: $KEY
              regex: (?i)(api[_]?key|api[_]?secret|secret[_]?key|password|passwd|token|auth[_]?token|access[_]?token|private[_]?key|credentials|client[_]?secret)
    message: >
      Hardcoded secret detected in '$KEY'. Store secrets in environment
      variables or a secrets manager (e.g., AWS Secrets Manager, Vault,
      Doppler). Never commit secrets to source control.
    severity: ERROR
    metadata:
      cwe: "CWE-798: Use of Hard-coded Credentials"
      category: security
      confidence: HIGH
      impact: HIGH
      owasp: "A07:2021 - Identification and Authentication Failures"
    languages: [javascript, typescript]
