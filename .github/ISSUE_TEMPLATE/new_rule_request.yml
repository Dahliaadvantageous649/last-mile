name: New Rule Request
description: Request a new Semgrep scanning rule
labels: ["rules", "enhancement"]
body:
  - type: textarea
    id: pattern
    attributes:
      label: What dangerous pattern should this catch?
      placeholder: Describe the anti-pattern with a code example.
    validations:
      required: true
  - type: textarea
    id: bad_code
    attributes:
      label: Example of bad code (should trigger)
      render: typescript
    validations:
      required: true
  - type: textarea
    id: good_code
    attributes:
      label: Example of good code (should NOT trigger)
      render: typescript
  - type: dropdown
    id: scope
    attributes:
      label: Rule scope
      options:
        - Universal (all frameworks)
        - Next.js
        - Express
        - FastAPI
        - Supabase
        - Other
  - type: input
    id: cwe
    attributes:
      label: CWE ID (if known)
      placeholder: "e.g., CWE-798, CWE-89"
