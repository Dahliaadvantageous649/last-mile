name: False Positive Report
description: Report a finding that is incorrect
labels: ["false-positive", "rules"]
body:
  - type: input
    id: rule
    attributes:
      label: Rule ID
      placeholder: "e.g., hardcoded-secrets, cors-wildcard"
    validations:
      required: true
  - type: textarea
    id: code
    attributes:
      label: Code that triggered the finding
      render: typescript
    validations:
      required: true
  - type: textarea
    id: why
    attributes:
      label: Why this is a false positive
      placeholder: Explain why this code is safe / intentional.
    validations:
      required: true
  - type: input
    id: framework
    attributes:
      label: Framework
      placeholder: "e.g., Next.js, Express, FastAPI"
  - type: input
    id: severity
    attributes:
      label: Reported severity
      placeholder: "e.g., critical, high, medium, low"
