name: Bug Report
description: Report a bug in Last Mile 360
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: Describe the bug clearly.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should have happened?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `last-mile scan`
        2. ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: CLI version
      placeholder: "0.1.0"
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS
        - Linux
        - Windows
        - Other
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      render: shell
