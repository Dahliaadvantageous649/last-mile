name: Feature Request
description: Suggest a new feature or enhancement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      placeholder: Describe the problem or gap this addresses.
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      placeholder: How should this work?
    validations:
      required: true
  - type: dropdown
    id: agent
    attributes:
      label: Which agent division?
      options:
        - Security Agent
        - Database Agent
        - Infrastructure Agent
        - Observability Agent
        - Quality Agent
        - CLI
        - Dashboard
        - Orchestrator
        - Other
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      placeholder: Other approaches you've thought about.
