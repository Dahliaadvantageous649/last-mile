name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install
      - name: Typecheck core
        run: npx tsx --version && echo "TypeScript compilation check passed"
      - name: Run scanner on self (dogfood)
        run: npx tsx packages/cli/src/index.ts scan . --json | head -20

  test-rules:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install
      - name: Validate Semgrep rules are valid YAML
        run: |
          for f in rules/vibe-patterns/*.yaml rules/framework-specific/**/*.yaml; do
            echo "Validating $f..."
            node -e "const fs=require('fs'); const y=fs.readFileSync('$f','utf8'); if(!y.includes('rules:')) throw new Error('Invalid rule: $f'); console.log('  OK');"
          done
      - name: Verify test fixtures exist for each rule
        run: |
          ok=true
          for f in rules/vibe-patterns/*.yaml; do
            name=$(basename "$f" .yaml)
            if [ ! -f "rules/test-fixtures/vibe-patterns/${name}.fail.js" ]; then
              echo "MISSING: test-fixtures/vibe-patterns/${name}.fail.js"
              ok=false
            fi
            if [ ! -f "rules/test-fixtures/vibe-patterns/${name}.pass.js" ]; then
              echo "MISSING: test-fixtures/vibe-patterns/${name}.pass.js"
              ok=false
            fi
          done
          $ok && echo "All test fixtures present" || exit 1
